name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: linux,   goarch: riscv64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -eu
          ref="${GITHUB_REF_NAME#v}"
          stage="$(mktemp -d)"
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi

          go build -trimpath \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o "$stage/localsend-cli${ext}" .
          chmod 755 "$stage/localsend-cli${ext}"
          cp LICENSE README.md "$stage/"

          mkdir -p dist
          base="localsend-cli_${ref}_${GOOS}_${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            (cd "$stage" && zip -q -r "$GITHUB_WORKSPACE/dist/${base}.zip" .)
          else
            tar -C "$stage" -czf "dist/${base}.tar.gz" .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives and compute checksums
        run: |
          set -eu
          mkdir -p out
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) \
            -exec mv {} out/ \;
          ( cd out && sha256sum -- * | sort -k2 > checksums.txt )
          ls -la out

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            out/*.tar.gz
            out/*.zip
            out/checksums.txt
